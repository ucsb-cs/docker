name: 10 - build-and-push-both.yml (Build and Push Both PrairieLearn Docker Images)

on:
  schedule:
    # Runs at 00:00 UTC every Sunday (Midnight UTC)
    - cron: '0 0 * * 0'
  workflow_dispatch: # Keeps the manual button active just in case

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-architecture builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERID }}
          password: ${{ secrets.DOCKER_PAT }}

      # --- 1. BUILD JUPYTERLAB IMAGE ---
      - name: Build and Push JupyterLab Image
        uses: docker/build-push-action@v5
        with:
          context: ./images/workspace-jupyterlab-python-datascience
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ucsbcs/workspace-jupyterlab-python-datascience:latest

      # --- 2. BUILD GRADER IMAGE ---
      - name: Build and Push Grader Image
        uses: docker/build-push-action@v5
        with:
          context: ./images/grader-python-datascience
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ucsbcs/grader-python-datascience:latest