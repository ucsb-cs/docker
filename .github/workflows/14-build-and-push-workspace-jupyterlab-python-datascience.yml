name: 14 - build-and-push-workspace-jupyterlab-python-datascience.yml (Build and Push JupyterLab Image Only)

on:
  workflow_dispatch: # Keeps the manual button active just in case

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-architecture builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERID }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and Push JupyterLab Image
        uses: docker/build-push-action@v5
        with:
          context: ./images/workspace-jupyterlab-python-datascience
          platforms: linux/amd64
          push: true
          tags: ucsbcs/workspace-jupyterlab-python-datascience:latest

